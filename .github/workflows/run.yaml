# This workflow does software tests when something updates
name: Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export config.json
        run: |
          curl "${{ secrets.API_URL }}/config?code=${{ secrets.API_SECRET }}" -o src/config.json

      - name: Export accounts.json
        run: |
          curl "${{ secrets.API_URL }}/accounts?code=${{ secrets.API_SECRET }}" -o src/accounts.json

      # Detecta mudanças
      - name: Paths filter
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'package-lock.json'
              - 'package.json'
            build:
              - 'src/**'
              - 'public/**'
              - 'webpack.config.js'
              - 'vite.config.js'
            tests:
              - 'tests/**'

      # Cache Node.js deps
      - name: Cache Node modules
        if: steps.changes.outputs.deps == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.tests == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Prepare (só se deps/build/tests mudaram)
      - name: Prepare
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.build == 'true' || steps.changes.outputs.tests == 'true'
        run: |
          npm -v
          npm ci --prefer-offline
          npm run build
          npx playwright install --with-deps

      - name: Chmod Run
        run: chmod +x ./run.sh

      # Sempre roda o job final
      - name: Run
        run: ./run.sh
