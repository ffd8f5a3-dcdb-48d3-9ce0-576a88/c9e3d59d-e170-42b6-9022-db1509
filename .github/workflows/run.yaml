# This workflow does software tests when something updates
name: Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export config.json
        run: |
          curl "${{ secrets.API_URL }}/config?code=${{ secrets.API_SECRET }}" -o src/config.json

      - name: Export accounts.json
        run: |
          curl "${{ secrets.API_URL }}/accounts?code=${{ secrets.API_SECRET }}" -o src/accounts.json

      # Cache Node.js deps
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Install system deps for Playwright
      - name: Install Playwright dependencies
        uses: microsoft/playwright-github-action@v1

      # Prepare
      - name: Prepare
        run: |
          npm -v
          npm install
          npm run build
          npx playwright install

      # Run
      - name: Run
        run: ./run.sh

  delete-old-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          keep_minimum_runs: 0
          retain_days: 0