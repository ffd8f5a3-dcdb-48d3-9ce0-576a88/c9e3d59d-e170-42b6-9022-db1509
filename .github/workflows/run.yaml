name: Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export config.json
        run: |
          curl "${{ secrets.API_URL }}/config?code=${{ secrets.API_SECRET }}" -o src/config.json

      - name: Export accounts.json
        run: |
          curl "${{ secrets.API_URL }}/accounts?code=${{ secrets.API_SECRET }}" -o src/accounts.json

      # Detectar mudanças nos arquivos
      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'package-lock.json'
              - 'package.json'
            build:
              - 'src/**'
              - 'public/**'
              - 'webpack.config.js'
              - 'vite.config.js'

      # Cache Node modules (só se deps mudarem)
      - name: Cache Node modules
        if: steps.changes.outputs.deps == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: Linux-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            Linux-npm-

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: Linux-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            Linux-playwright-

      # Prepare (rodar só quando deps ou build mudarem)
      - name: Prepare
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.build == 'true'
        run: |
          npm -v
          npm install
          npm run build
          npx playwright install --with-deps

      - name: Chmod Run
        run: chmod +x ./run.sh

      # Rodar sempre
      - name: Run
        run: ./run.sh
