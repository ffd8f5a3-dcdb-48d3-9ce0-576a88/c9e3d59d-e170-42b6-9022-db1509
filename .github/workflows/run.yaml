# This workflow does software tests when something updates
name: Run software tests with remote configs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export config.json
        run: |
          curl "${{ secrets.API_URL }}/config?code=${{ secrets.API_SECRET }}" -o src/config.json

      - name: Export accounts.json
        run: |
          curl "${{ secrets.API_URL }}/accounts?code=${{ secrets.API_SECRET }}" -o src/accounts.json

      - name: Chmod prepare
        run: chmod +x prepare.sh
        
      - name: Chmod run
        run: chmod +x run.sh

      - name: Prepare
        run: ./prepare.sh
      
      - name: Run
        run: ./run.sh

  delete-old-runs:
    runs-on: ubuntu-latest
    permissions:
        actions: write
        contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          keep_minimum_runs: 0
          retain_days: 0
